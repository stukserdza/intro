    <!-- Styles -->
    <style>
        :root {
            /* Цвета: #380606, #FFC909, #000000, #FFFFFF */
            /* --deep-red: #380606; */
            /* --deep-red: #440000; */
            --beige: #edded2;
            --gold-light: #fde885;
            --gold-bright: #ffc909;
            --deep-red: #210202;
            --deepest-red: #110205;
            --black: #000000;
            --white: #ffffff;
            --extra-background: #0000006a;

            --ff-headings: "Lora", Georgia, serif;
            --ff-body:
                "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --faq-line: rgba(240, 220, 210, 0.85);
            --faq-text: #e7d1c8;
            --faq-accent: #f2e2d7;
            --fs-section-title: clamp(2rem, 1.4rem + 2vw, 2.8125rem);
            /* 32px → 45px */
            --fs-main-text: clamp(1rem, 0.9rem + 0.4vw, 1.25rem);
            /* 16px → 20px */
            --fs-little-text: clamp(0.875rem, 0.8rem + 0.2vw, 1rem);
            /* 14px → 16px */
            --fs-btn-text: clamp(0.875rem, 0.8rem + 0.2vw, 1rem);
            /* 14px → 16px */
            --fs-card-text: clamp(1.25rem, 1rem + 1.2vw, 1.875rem);
            /* 20px → 30px */
            --fs-36-text: clamp(1.5rem, 1.2rem + 1.5vw, 2.25rem);
            /* 24px → 36px */
            --fs-20-text: clamp(1rem, 0.9rem + 0.4vw, 1.25rem);
            /* 16px → 20px */
            --fs-14-text: clamp(0.875rem, 0.8rem + 0.15vw, 0.875rem);
            /* 14px fixed */
            --fs-slogan: clamp(3.125rem, 2.2rem + 3.2vw, 4.375rem);
            /* 50px → 70px */
            /* --fs-slogan: clamp(3.5rem, 2.6rem + 2.8vw, 4.375rem); */
            /* 56px → 70px */
            --ff-section-mobile: 24px;
            --fx-20-to-14-mobile: 14px;
            --card-border: 1px solid #edded26d;
            --card-border-red: 1px solid rgba(75, 0, 8, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--ff-headings);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        body {
            font-family: var(--ff-body);
            background: var(--deep-red);
            color: var(--white);
            line-height: 1.5;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        section {
            padding: 4.375em 1em !important;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        main {
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .section-title {
            font-weight: 400;
            font-size: var(--fs-section-title);
            line-height: 1.25;
            color: var(--gold-light);
            text-align: center;
        }

        .section__404 {
            max-width: 500px;
            width: 100%;
            color: var(--beige);
            padding: 3em 2em;
            text-align: center;
        }

        .med-404-subtitle {
            font-size: var(--fs-20-text);
            opacity: 1;
        }

        .med-404-text {
            opacity: 0.8;
            padding: 2em 0;
        }

        .med-404-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 2em 0;
        }

        .med-404-countdown {
            font-size: 14px;
            opacity: 0.9;
            color: var(--gold-light);
        }

        /* Glow effect */
        .med-404-glow {
            position: absolute;
            width: 300px;
            height: 300px;

            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(40px);
        }
    </style>

    <!-- Google Fonts: Montserrat (body) + Lora (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

<body>

    <main class="legal__page" id="top">
        <section class="section__404">

            <div class="med-404-glow"></div>

            <h1 class="section-title">404</h1>

            <p class="med-404-subtitle">
                Страница не найдена…<br>
                но, возможно, ты пришёл сюда не случайно
            </p>

            <p class="med-404-text">
                Иногда путь к ответу лежит через отклонение от маршрута.
                Попробуй вернуться — или позволь себе выбрать новое направление.
            </p>

            <div class="med-404-actions">
                <a href="/" class="btn-primary">На главную</a>
            </div>

            <div class="med-404-countdown">
                Автоматический возврат через <span id="count">10</span> сек
            </div>

        </section>
    </main>
    <script src="assets/js/script.js"></script>
    <script>
        let seconds = 10;
        const el = document.getElementById("count");

        const timer = setInterval(() => {
            seconds--;
            el.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>
